<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Orders — Bleach Resistant Admin</title>
  <link rel="icon" href="https://static.wixstatic.com/media/926a36_bea70e48de2b461ebaae685fdbb3be76%7Emv2.png/v1/fill/w_32%2Ch_32%2Clg_1%2Cusm_0.66_1.00_0.01/926a36_bea70e48de2b461ebaae685fdbb3be76%7Emv2.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
</head>
<body>

  <!-- ===== SIDEBAR ===== -->
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <h2>Bleach Resistant</h2>
      <small>Admin Panel</small>
    </div>
    <div class="sidebar-nav">
      <div class="nav-section">Main</div>
      <a href="admin.html"><span class="icon">📊</span> Dashboard</a>
      <a href="admin-orders.html" class="active"><span class="icon">📦</span> Orders</a>
      <a href="admin-contacts.html"><span class="icon">💬</span> Contacts</a>
      <div class="nav-section">Content</div>
      <a href="admin-pages.html"><span class="icon">📄</span> Pages</a>
      <a href="admin-media.html"><span class="icon">🖼️</span> Media Library</a>
      <div class="nav-section">Website</div>
      <a href="home.html" target="_blank"><span class="icon">🌐</span> View Site</a>
      <a href="order.html" target="_blank"><span class="icon">🛒</span> Order Page</a>
    </div>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar" id="user-avatar">A</div>
        <div>
          <div style="font-size:12px;font-weight:600;" id="user-name">Admin</div>
          <div class="user-email" id="user-email">loading…</div>
        </div>
      </div>
      <button class="btn btn-secondary btn-sm btn-block" onclick="brSignOut()">Sign Out</button>
    </div>
  </nav>

  <!-- ===== MAIN ===== -->
  <div class="main-content">
    <div class="topbar">
      <div>
        <h1>Orders</h1>
        <div class="breadcrumb">Manage order requests and quotes</div>
      </div>
      <div class="topbar-actions">
        <select id="filter-status" class="form-group" style="margin:0;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:12px;">
          <option value="">All Statuses</option>
          <option value="new">New</option>
          <option value="in-progress">In Progress</option>
          <option value="complete">Complete</option>
          <option value="closed">Closed</option>
        </select>
        <button class="btn btn-sm btn-primary" onclick="exportCSV()">📥 Export CSV</button>
      </div>
    </div>

    <div class="content-area">
      <div class="table-card">
        <div class="table-header">
          <h3>All Orders <span id="order-count" style="color:#aaa;font-weight:400;"></span></h3>
          <div class="table-actions">
            <input type="text" class="search-input" id="search-input" placeholder="Search by name or email…">
          </div>
        </div>
        <div style="overflow-x:auto;">
          <table class="data-table">
            <thead>
              <tr>
                <th>Date</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Item</th>
                <th>Qty</th>
                <th>Deadline</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="orders-body">
              <tr><td colspan="9" class="loading-overlay"><span class="spinner"></span> Loading orders…</td></tr>
            </tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </div>

  <!-- ===== VIEW/EDIT MODAL ===== -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Order Details</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script>
    let allOrders = [];
    let currentPage = 1;
    const perPage = 20;

    function showToast(msg, type) {
      const t = document.getElementById('toast');
      t.className = 'toast toast-' + (type || 'info');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    function statusBadge(s) {
      const map = { new: 'badge-new', 'in-progress': 'badge-progress', complete: 'badge-complete', closed: 'badge-closed' };
      return '<span class="badge ' + (map[s] || 'badge-new') + '">' + brEscapeHtml(s || 'new') + '</span>';
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('active');
    }

    async function loadOrders() {
      try {
        const { data, error } = await db.from('orders')
          .select('*')
          .order('created_at', { ascending: false });
        if (error) throw error;
        allOrders = data || [];
        renderOrders();
      } catch (err) {
        console.error(err);
        document.getElementById('orders-body').innerHTML =
          '<tr><td colspan="9" class="empty-state"><p>Error loading orders</p></td></tr>';
      }
    }

    function getFiltered() {
      const search = document.getElementById('search-input').value.toLowerCase();
      const status = document.getElementById('filter-status').value;
      return allOrders.filter(o => {
        if (status && o.status !== status) return false;
        if (search && !o.name?.toLowerCase().includes(search) && !o.email?.toLowerCase().includes(search)) return false;
        return true;
      });
    }

    function renderOrders() {
      const filtered = getFiltered();
      const total = filtered.length;
      const pages = Math.ceil(total / perPage) || 1;
      if (currentPage > pages) currentPage = pages;
      const start = (currentPage - 1) * perPage;
      const pageData = filtered.slice(start, start + perPage);

      document.getElementById('order-count').textContent = '(' + total + ')';

      const tbody = document.getElementById('orders-body');
      if (pageData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="9" class="empty-state"><p>No orders found</p></td></tr>';
      } else {
        tbody.innerHTML = pageData.map(o => `
          <tr>
            <td style="white-space:nowrap;">${brFormatDate(o.created_at)}</td>
            <td><strong>${brEscapeHtml(o.name)}</strong></td>
            <td>${brEscapeHtml(o.email)}</td>
            <td>${brEscapeHtml(o.phone || '—')}</td>
            <td>${brEscapeHtml(o.item_type || '—')}</td>
            <td>${o.quantity || '—'}</td>
            <td>${o.deadline || '—'}</td>
            <td>${statusBadge(o.status)}</td>
            <td style="white-space:nowrap;">
              <button class="btn btn-sm btn-secondary" onclick="viewOrder('${o.id}')">View</button>
              <button class="btn btn-sm btn-danger" onclick="deleteOrder('${o.id}')">✕</button>
            </td>
          </tr>
        `).join('');
      }

      // Pagination
      const pag = document.getElementById('pagination');
      if (pages <= 1) { pag.innerHTML = ''; return; }
      let html = '<button ' + (currentPage === 1 ? 'disabled' : '') + ' onclick="goPage(' + (currentPage-1) + ')">‹</button>';
      for (let i = 1; i <= pages; i++) {
        html += '<button class="' + (i === currentPage ? 'active' : '') + '" onclick="goPage(' + i + ')">' + i + '</button>';
      }
      html += '<button ' + (currentPage === pages ? 'disabled' : '') + ' onclick="goPage(' + (currentPage+1) + ')">›</button>';
      pag.innerHTML = html;
    }

    function goPage(p) { currentPage = p; renderOrders(); }

    function viewOrder(id) {
      const o = allOrders.find(x => x.id === id);
      if (!o) return;

      document.getElementById('modal-title').textContent = 'Order from ' + o.name;
      document.getElementById('modal-body').innerHTML = `
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div class="form-group">
            <label>Name</label>
            <input type="text" value="${brEscapeHtml(o.name)}" readonly style="background:#f9f9f9;">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="text" value="${brEscapeHtml(o.email)}" readonly style="background:#f9f9f9;">
          </div>
          <div class="form-group">
            <label>Phone</label>
            <input type="text" value="${brEscapeHtml(o.phone || '')}" readonly style="background:#f9f9f9;">
          </div>
          <div class="form-group">
            <label>Item Type</label>
            <input type="text" value="${brEscapeHtml(o.item_type || '')}" readonly style="background:#f9f9f9;">
          </div>
          <div class="form-group">
            <label>Quantity</label>
            <input type="text" value="${o.quantity || ''}" readonly style="background:#f9f9f9;">
          </div>
          <div class="form-group">
            <label>Deadline</label>
            <input type="text" value="${o.deadline || ''}" readonly style="background:#f9f9f9;">
          </div>
        </div>
        <div class="form-group">
          <label>Design Notes</label>
          <textarea readonly style="background:#f9f9f9;min-height:80px;">${brEscapeHtml(o.design_notes || '')}</textarea>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="edit-status" style="padding:10px 14px;border:1px solid #ddd;border-radius:6px;width:100%;">
            <option value="new" ${o.status==='new'?'selected':''}>New</option>
            <option value="in-progress" ${o.status==='in-progress'?'selected':''}>In Progress</option>
            <option value="complete" ${o.status==='complete'?'selected':''}>Complete</option>
            <option value="closed" ${o.status==='closed'?'selected':''}>Closed</option>
          </select>
        </div>
        <div style="font-size:11px;color:#aaa;margin-top:8px;">
          Submitted: ${brFormatDate(o.created_at)} &nbsp;|&nbsp; ID: ${o.id}
        </div>
      `;
      document.getElementById('modal-footer').innerHTML = `
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="updateStatus('${o.id}')">Save Status</button>
      `;
      document.getElementById('modal-overlay').classList.add('active');
    }

    async function updateStatus(id) {
      const newStatus = document.getElementById('edit-status').value;
      try {
        const { error } = await db.from('orders').update({ status: newStatus }).eq('id', id);
        if (error) throw error;
        closeModal();
        showToast('Status updated', 'success');
        loadOrders();
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      }
    }

    async function deleteOrder(id) {
      if (!confirm('Delete this order permanently?')) return;
      try {
        const { error } = await db.from('orders').delete().eq('id', id);
        if (error) throw error;
        showToast('Order deleted', 'success');
        loadOrders();
      } catch (err) {
        showToast('Error: ' + err.message, 'error');
      }
    }

    function exportCSV() {
      const rows = getFiltered();
      if (rows.length === 0) { showToast('No data to export', 'info'); return; }
      const headers = ['Date','Name','Email','Phone','Item Type','Quantity','Deadline','Status','Notes'];
      const csv = [headers.join(',')];
      rows.forEach(o => {
        csv.push([
          o.created_at, o.name, o.email, o.phone||'', o.item_type||'',
          o.quantity||'', o.deadline||'', o.status, (o.design_notes||'').replace(/,/g, ';').replace(/\n/g, ' ')
        ].map(v => '"' + String(v).replace(/"/g, '""') + '"').join(','));
      });
      const blob = new Blob([csv.join('\n')], { type: 'text/csv' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'orders_' + new Date().toISOString().slice(0,10) + '.csv';
      a.click();
    }

    // Event listeners
    document.getElementById('search-input').addEventListener('input', () => { currentPage = 1; renderOrders(); });
    document.getElementById('filter-status').addEventListener('change', () => { currentPage = 1; renderOrders(); });

    // Init
    (async () => {
      try {
        const user = await brRequireAdmin();
        const name = user.user_metadata?.full_name || user.email?.split('@')[0] || 'Admin';
        document.getElementById('user-name').textContent = name;
        document.getElementById('user-email').textContent = user.email;
        document.getElementById('user-avatar').textContent = name.charAt(0).toUpperCase();
        await loadOrders();
      } catch (err) {
        if (err.message !== 'Not authenticated') console.error(err);
      }
    })();
  </script>
</body>
</html>
