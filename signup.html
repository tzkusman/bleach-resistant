<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Account â€” Bleach Resistant</title>
  <link rel="icon" href="favicon.svg" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="logo">
        <h1>Bleach Resistant</h1>
        <p>Create Your Account</p>
      </div>

      <h2>Create Account</h2>

      <div id="alert" class="alert" style="display:none;"></div>

      <form id="signup-form" autocomplete="on">
        <div class="form-group">
          <label for="fullname">Full Name</label>
          <input id="fullname" name="fullname" type="text" required placeholder="John Smith" autocomplete="name">
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input id="email" name="email" type="email" required placeholder="admin@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" required placeholder="Min. 6 characters" autocomplete="new-password" minlength="6">
        </div>
        <div class="form-group">
          <label for="password2">Confirm Password</label>
          <input id="password2" name="password2" type="password" required placeholder="Repeat password" autocomplete="new-password" minlength="6">
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="submit-btn">
          Create Account
        </button>
      </form>

      <div style="text-align:center;margin-top:20px;font-size:12px;color:#888;">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
      <div style="text-align:center;margin-top:12px;">
        <a href="home.html" style="font-size:11px;color:#aaa;text-decoration:none;">â† Back to Website</a>
      </div>
    </div>
  </div>

  <script>
    // If already logged in, redirect accordingly
    (async () => {
      const user = await brGetUser();
      if (user) {
        window.location.href = brIsAdmin(user) ? 'admin.html' : 'home.html';
      }
    })();

    document.getElementById('signup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const alert = document.getElementById('alert');
      alert.style.display = 'none';

      const fullname = document.getElementById('fullname').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const password2 = document.getElementById('password2').value;

      if (!fullname || !email || !password) {
        alert.className = 'alert alert-error';
        alert.textContent = 'Please fill in all fields.';
        alert.style.display = 'block';
        return;
      }

      if (password !== password2) {
        alert.className = 'alert alert-error';
        alert.textContent = 'Passwords do not match.';
        alert.style.display = 'block';
        return;
      }

      if (password.length < 6) {
        alert.className = 'alert alert-error';
        alert.textContent = 'Password must be at least 6 characters.';
        alert.style.display = 'block';
        return;
      }

      // Block admin email from being registered via public signup
      if (email.toLowerCase() === BR_ADMIN_EMAIL.toLowerCase()) {
        alert.className = 'alert alert-error';
        alert.textContent = 'This email is reserved. Please use a different email.';
        alert.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Creating accountâ€¦';

      try {
        const { data, error } = await db.auth.signUp({
          email,
          password,
          options: {
            data: { full_name: fullname }
          }
        });
        if (error) throw error;

        // Check if email confirmation is required
        if (data.user && !data.session) {
          alert.className = 'alert alert-success';
          alert.innerHTML = 'Account created! Check your email for a confirmation link, then <a href="login.html">sign in</a>.';
          alert.style.display = 'block';
          btn.textContent = 'Email Sent';
        } else {
          // Auto confirmed â€” redirect to home (not admin)
          window.location.href = 'home.html';
        }
      } catch (err) {
        alert.className = 'alert alert-error';
        alert.textContent = err.message || 'Signup failed. Try again.';
        alert.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    });
  </script>
</body>
</html>
